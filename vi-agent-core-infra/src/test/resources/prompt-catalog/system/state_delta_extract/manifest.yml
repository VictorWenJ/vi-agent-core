promptKey: state_delta_extract
purpose: state_delta_extraction
renderOutputType: chat_messages
description: State delta extraction template.
structuredOutputContractKey: state_delta_output
inputVariables:
  - variableName: sessionId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Session ID.
  - variableName: turnId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Turn ID.
  - variableName: runId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Run ID.
  - variableName: currentStateJson
    variableType: json
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 8000
    truncateMarker: "[TRUNCATED]"
    description: Current state JSON.
  - variableName: conversationSummaryText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: false
    maxChars: 6000
    truncateMarker: "[TRUNCATED]"
    description: Current summary text.
    defaultValue: ""
  - variableName: turnMessagesText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: Current turn messages text.
  - variableName: unusedControl
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: false
    description: Declared but unused variable for loader contract coverage.
    defaultValue: ""
