promptKey: conversation_summary_extract
purpose: conversation_summary_extraction
renderOutputType: chat_messages
description: Conversation summary extraction template.
structuredOutputContractKey: conversation_summary_output
inputVariables:
  - variableName: conversationId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: false
    description: Conversation ID.
    defaultValue: ""
  - variableName: sessionId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Session ID.
  - variableName: turnId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Turn ID.
  - variableName: runId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Run ID.
  - variableName: traceId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: false
    description: Trace ID.
    defaultValue: ""
  - variableName: agentMode
    variableType: enum
    trustLevel: trusted_control
    placement: metadata_block
    required: false
    description: Agent mode.
    defaultValue: general
  - variableName: workingContextSnapshotId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: false
    description: Working context snapshot ID.
    defaultValue: ""
  - variableName: previousSummaryText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: false
    maxChars: 8000
    truncateMarker: "[TRUNCATED]"
    description: Previous summary text.
    defaultValue: ""
  - variableName: latestStateJson
    variableType: json
    trustLevel: untrusted_data
    placement: data_block
    required: false
    maxChars: 8000
    truncateMarker: "[TRUNCATED]"
    description: Latest state JSON.
    defaultValue: "{}"
  - variableName: turnMessagesText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: Current turn messages text.
