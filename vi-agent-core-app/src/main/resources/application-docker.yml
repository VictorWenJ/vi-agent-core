spring:
  datasource:
    url: jdbc:mysql://mysql:3306/vi_agent_core?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false
    username: root
    password: vi_agent_root_pwd
  data:
    redis:
      host: redis
      port: 6379
      database: 0

server:
  port: 8080

vi:
  agent:
    redis:
      ttl:
        session-working-set-seconds: ${SESSION_WORKING_SET_TTL_SECONDS:1800}
        session-state-seconds: ${SESSION_STATE_TTL_SECONDS:1800}
        session-summary-seconds: ${SESSION_SUMMARY_TTL_SECONDS:1800}
        request-cache-seconds: ${REQUEST_CACHE_TTL_SECONDS:3600}
        session-lock-seconds: ${SESSION_LOCK_TTL_SECONDS:60}
