promptKey: conversation_summary_render
purpose: conversation_summary_render
renderOutputType: text
description: Conversation summary render template.
inputVariables:
  - variableName: summaryVersion
    variableType: number
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Conversation summary version.
  - variableName: summaryText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: Conversation summary text.
