promptKey: conversation_summary_extract
purpose: conversation_summary_extraction
renderOutputType: chat_messages
description: Conversation summary extraction template.
structuredOutputContractKey: conversation_summary_output
inputVariables:
  - variableName: sessionId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Session ID.
  - variableName: turnId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Turn ID.
  - variableName: runId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: Run ID.
  - variableName: previousSummaryText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: false
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: Previous conversation summary text.
    defaultValue: ""
  - variableName: latestStateJson
    variableType: json
    trustLevel: untrusted_data
    placement: data_block
    required: false
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: Latest session state JSON.
    defaultValue: "{}"
  - variableName: turnMessagesText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 16000
    truncateMarker: "[TRUNCATED]"
    description: Current turn messages text.
