promptKey: session_state_render
purpose: session_state_render
renderOutputType: text
description: 会话状态上下文渲染模板
inputVariables:
  - variableName: stateVersion
    variableType: number
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: 会话状态版本
  - variableName: sessionStateJson
    variableType: json
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: 会话状态 JSON 文本
