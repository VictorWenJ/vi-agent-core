promptKey: state_delta_extract
purpose: state_delta_extraction
renderOutputType: chat_messages
description: 状态增量抽取模板
structuredOutputContractKey: state_delta_output
inputVariables:
  - variableName: sessionId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: 会话 ID
  - variableName: turnId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: 回合 ID
  - variableName: runId
    variableType: text
    trustLevel: trusted_control
    placement: metadata_block
    required: true
    description: 运行 ID
  - variableName: currentStateJson
    variableType: json
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: 当前会话状态 JSON
  - variableName: conversationSummaryText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: false
    maxChars: 12000
    truncateMarker: "[TRUNCATED]"
    description: 当前会话摘要文本
    defaultValue: ""
  - variableName: turnMessagesText
    variableType: text
    trustLevel: untrusted_data
    placement: data_block
    required: true
    maxChars: 16000
    truncateMarker: "[TRUNCATED]"
    description: 当前 turn 消息文本
