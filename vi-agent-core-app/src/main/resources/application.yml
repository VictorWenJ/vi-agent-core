spring:
  application:
    name: vi-agent-core
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/vi_agent_core?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: 3s

mybatis-plus:
  configuration:
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

server:
  port: ${SERVER_PORT:8080}

management:
  health:
    redis:
      enabled: true

logging:
  level:
    root: INFO
    com.vi.agent.core: INFO

vi:
  agent:
    redis:
      ttl:
        session-working-set-seconds: ${SESSION_WORKING_SET_TTL_SECONDS:1800}
        session-state-seconds: ${SESSION_STATE_TTL_SECONDS:1800}
        session-summary-seconds: ${SESSION_SUMMARY_TTL_SECONDS:1800}
        request-cache-seconds: ${REQUEST_CACHE_TTL_SECONDS:3600}
        session-lock-seconds: ${SESSION_LOCK_TTL_SECONDS:60}

    runtime:
      max-iterations: 6
      session-working-set:
        max-completed-turns: 5

    context:
      budget:
        model-max-input-tokens: ${CONTEXT_MODEL_MAX_INPUT_TOKENS:8192}
        reserved-output-tokens: ${CONTEXT_RESERVED_OUTPUT_TOKENS:1024}
        reserved-tool-loop-tokens: ${CONTEXT_RESERVED_TOOL_LOOP_TOKENS:1024}
        safety-margin-tokens: ${CONTEXT_SAFETY_MARGIN_TOKENS:512}

    memory:
      post-turn-update-enabled: ${MEMORY_POST_TURN_UPDATE_ENABLED:true}
      state-extraction-enabled: ${MEMORY_STATE_EXTRACT_ENABLED:true}
      summary-update-enabled: ${MEMORY_SUMMARY_EXTRACT_ENABLED:true}

    provider:
      routing:
        default-provider: ${DEFAULT_LLM_PROVIDER:deepseek}

      deepseek:
        api-key: ${DEEPSEEK_API_KEY:sk-2ed15312da914180a6763153a4ff1987}
        model: ${DEEPSEEK_MODEL:deepseek-chat}
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        chat-path: /chat/completions
        thinking-type: ${DEEPSEEK_THINKING_TYPE:disabled}
        max-tokens: ${DEEPSEEK_MAX_TOKENS:512}
        temperature: ${DEEPSEEK_TEMPERATURE:0.2}
        connect-timeout-ms: 3000
        read-timeout-ms: 60000

      doubao:
        api-key: ${DOUBAO_API_KEY:45fcac73-1c33-4ba7-b0e1-4bfd96f40271}
        model: ${DOUBAO_MODEL:doubao-seed-2-0-pro-260215}
        base-url: ${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com}
        chat-path: /api/v3/chat/completions
        connect-timeout-ms: 3000
        read-timeout-ms: 60000

      openai:
        api-key: ${OPENAI_API_KEY:}
        model: ${OPENAI_MODEL:gpt-4o-mini}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com}
        chat-path: /v1/chat/completions
        connect-timeout-ms: 3000
        read-timeout-ms: 60000
