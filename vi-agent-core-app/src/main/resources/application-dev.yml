spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vi_agent_core?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.vi.agent.core: DEBUG

vi:
  agent:
    runtime:
      max-iterations: 6
      session-working-set:
        max-completed-turns: 5

    provider:
      routing:
        default-provider: deepseek
