spring:
  datasource:
    url: jdbc:h2:mem:vi_agent_core;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

management:
  health:
    redis:
      enabled: false

vi:
  agent:
    runtime:
      max-iterations: 4
      session-context:
        max-turns: 5

    provider:
      routing:
        default-provider: deepseek

